<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Admin - Manage Profile</title>
    <style>
        :root {
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --surface-tint: #f1f5f9;
            --border: rgba(99, 102, 241, 0.18);
            --border-soft: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --accent-ring: rgba(99, 102, 241, 0.35);
            --danger-soft: #fef2f2;
            --shadow: 0 10px 40px rgba(30, 27, 75, 0.12);
            --shadow-sm: 0 4px 20px rgba(30, 27, 75, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif; }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 10% -10%, rgba(99, 102, 241, 0.22), transparent 55%),
                radial-gradient(900px 500px at 100% 20%, rgba(14, 165, 233, 0.12), transparent 50%),
                linear-gradient(165deg, #dce4f3 0%, #e8edf7 38%, #eef2f9 100%);
        }

        .container { min-height: 100vh; }
        .main-content { padding: 30px; max-width: 1500px; margin: 0 auto; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            padding: 16px 26px;
            border-radius: 14px;
            margin-bottom: 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }

        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 26px;
        }

        .tab-btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid var(--border-soft);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
            color: var(--text-muted);
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
        }

        .tab-btn:hover:not(.active) {
            background: #fff;
            border-color: #c7d2fe;
            color: var(--accent);
        }

        .admin-section {
            background: var(--surface);
            border-radius: 14px;
            padding: 26px;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.8);
            outline: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-soft);
            padding-bottom: 12px;
            position: relative;
        }
        .section-header::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: min(160px, 40%);
            height: 3px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), #38bdf8);
        }

        h2 { font-size: 20px; color: var(--text); letter-spacing: -0.02em; }

        .action-bar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #a5b4fc;
            box-shadow: 0 0 0 3px var(--accent-ring);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
        }
        .btn:active { transform: translateY(1px); }
        .btn-black {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
        }
        .btn-black:hover {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }
        .btn-view {
            background: var(--accent-light);
            color: #312e81;
            border: 1px solid #c7d2fe;
            font-weight: 600;
            box-shadow: none;
        }
        .btn-view:hover {
            background: #e0e7ff;
            border-color: #a5b4fc;
        }
        .logout-btn {
            border: 1px solid rgba(220, 38, 38, 0.45);
            color: #b91c1c;
            background: var(--danger-soft);
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.35);
        }

        .topbar-user {
            font-size: 16px;
            color: var(--text-muted);
        }

        .topbar-user strong {
            color: var(--text);
            font-size: 17px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
        }

        .subsection {
            padding: 18px;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            background: linear-gradient(180deg, #fafbfc 0%, var(--surface-soft) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .subsection h3 {
            font-size: 15px;
            margin-bottom: 10px;
            color: #1e293b;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 8px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.35);
        }
        .btn-danger:hover {
            background: linear-gradient(135deg, #fca5a5 0%, #f87171 100%);
        }

        .btn-muted {
            background: var(--surface-tint);
            color: #334155;
            border: 1px solid var(--border-soft);
        }
        .btn-muted:hover { background: #e2e8f0; }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid var(--border-soft);
            background: #fff;
            color: #1e293b;
            font-weight: 600;
        }

        .pill.ok { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
        .pill.bad { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }

        .table-wrap {
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
        }

        .table-scroll {
            max-height: 1000px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 980px;
        }

        #up-table {
            min-width: 0;
        }

        #up-table thead th:nth-child(1) { width: 80px; }
        #up-table thead th:nth-child(2) { width: 200px; }
        #up-table thead th:nth-child(3) { width: 120px; }
        #up-table thead th:nth-child(4) { width: 220px; text-align: center; }

        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: linear-gradient(180deg, #f1f5f9 0%, #e8eef5 100%);
            border-bottom: 1px solid var(--border-soft);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #475569;
            padding: 12px 12px;
            text-align: left;
            white-space: nowrap;
        }

        tbody td {
            padding: 12px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #1e293b;
            vertical-align: middle;
        }

        tbody tr:hover td { background: #f5f7ff; }

        .td-actions {
            display: inline-flex;
            gap: 6px;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
        }

        #up-table thead th:last-child {
            text-align: center;
        }

        #up-table tbody td:last-child {
            text-align: center;
            vertical-align: middle;
        }

        #up-table .td-actions {
            justify-content: center;
            align-items: center;
        }

        #up-table .td-actions button.btn-sm {
            box-sizing: border-box;
            min-height: 28px;
            height: 28px;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #up-table .td-actions button[data-action="toggle"].btn-sm {
            min-width: 104px;
        }

        .muted {
            color: var(--text-muted);
            font-size: 12px;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            gap: 12px;
            border-top: 1px solid var(--border-soft);
            background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
        }

        .drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            z-index: 999;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: min(520px, 92vw);
            background: #fff;
            box-shadow: -12px 0 40px rgba(30, 27, 75, 0.18);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.18s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .drawer.open { transform: translateX(0); }
        .drawer-backdrop.open { display: block; }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-soft);
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }

        .drawer-title {
            display: grid;
            gap: 2px;
        }

        .drawer-title strong { font-size: 14px; color: #1e293b; }

        .drawer-body {
            padding: 18px;
            overflow: auto;
            display: grid;
            gap: 14px;
        }

        .drawer-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
        }

        .kv {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            align-items: center;
        }

        .kv .k { color: var(--text-muted); font-size: 12px; }
        .kv .v { color: #1e293b; font-size: 14px; }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            z-index: 1100;
            box-shadow: 0 12px 32px rgba(30, 27, 75, 0.35);
            border: 1px solid rgba(165, 180, 252, 0.35);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1300;
        }

        .modal-backdrop.open { display: block; }

        .modal {
            position: fixed;
            left: 50%;
            top: 8%;
            transform: translateX(-50%);
            width: min(640px, 92vw);
            max-height: 88vh;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(30, 27, 75, 0.22);
            display: none;
            z-index: 1310;
            overflow: hidden;
        }

        .modal.open { display: block; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            border-bottom: 1px solid var(--border-soft);
        }

        .modal-header strong {
            font-size: 16px;
            color: #1e293b;
        }

        .modal-body {
            padding: 16px 18px;
            font-size: 16px;
            line-height: 1.5;
            color: #1e293b;
            word-break: break-word;
            overflow: auto;
            max-height: calc(88vh - 56px - 64px);
        }

        #up-note-modal.modal {
            top: 18%;
            width: min(560px, 92vw);
            max-height: 70vh;
        }

        .modal-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
        }

        #up-edit-form.card {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
        }

        @media (max-width: 980px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 16px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 14px 16px;
            }

            .logout-btn {
                width: 100%;
                text-align: center;
            }

            .tab-bar {
                gap: 10px;
                flex-wrap: wrap;
            }

            .tab-btn {
                flex: 1 1 160px;
                width: 100%;
            }

            .admin-section {
                padding: 16px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .table-wrap,
            .table-scroll {
                overflow-x: visible;
                -webkit-overflow-scrolling: touch;
            }

            .table-scroll {
                max-height: none;
            }

            #up-table {
                min-width: 0;
                width: 100%;
                table-layout: fixed;
            }

            #up-table thead {
                display: none;
            }

            #up-table,
            #up-table tbody,
            #up-table tr,
            #up-table td {
                display: block;
                width: 100%;
            }

            #up-table tbody tr {
                background: #fff;
                border: 1px solid var(--border-soft);
                border-radius: 10px;
                padding: 8px 10px;
                margin-bottom: 10px;
                box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
            }

            #up-table tbody td {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 10px;
                padding: 8px 0;
                border-bottom: 1px solid #f1f2f4;
                font-size: 14px;
                white-space: normal;
                word-break: break-word;
                text-align: right;
            }

            #up-table tbody td:last-child {
                border-bottom: none;
            }

            #up-table tbody td::before {
                color: var(--text-muted);
                font-weight: 600;
                text-align: left;
                padding-right: 8px;
                flex: 0 0 42%;
            }

            #up-table tbody td:nth-child(1)::before { content: "ID"; }
            #up-table tbody td:nth-child(2)::before { content: "Role Name"; }
            #up-table tbody td:nth-child(3)::before { content: "Status"; }
            #up-table tbody td:nth-child(4)::before { content: "Actions"; }

            #up-table tbody td[colspan] {
                display: block;
                text-align: center !important;
            }

            #up-table tbody td[colspan]::before {
                content: none;
            }

            #up-table .pill {
                font-size: 13px;
                padding: 6px 10px;
                white-space: nowrap;
            }

            #up-table .td-actions {
                width: auto;
                justify-content: flex-end;
                flex-wrap: wrap;
                gap: 8px;
            }

            #up-table .td-actions button.btn-sm,
            #up-table .td-actions button[data-action="toggle"].btn-sm {
                min-width: 92px;
                width: auto;
                white-space: nowrap;
                font-size: 12px;
                padding: 0 8px;
            }

            .pagination {
                flex-direction: column;
                align-items: flex-start;
            }

            .drawer {
                width: 100vw;
            }

            .drawer-footer,
            .modal-footer {
                flex-wrap: wrap;
            }

            .drawer-footer .btn,
            .modal-footer .btn {
                flex: 1 1 120px;
            }

            .kv {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .modal {
                top: 5%;
                width: 94vw;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <main class="main-content">
        <div class="topbar">
            <span class="topbar-user">Logged in as: <strong> User Admin</strong></span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" type="button" onclick="location.href='ManageProfile.html'">Manage Profile</button>
            <button class="tab-btn" type="button" onclick="location.href='ManageAccount.html'">Manage Account</button>
        </div>

        <div class="admin-section">
            <div class="section-header">
                <h2> Profile Management</h2>
            </div>

            <div class="action-bar">
                <form id="up-create-form" class="subsection">
                    <h3>Create User Profile</h3>
                    <div class="grid-2" style="margin-top:10px;">
                        <div class="form-group">
                            <label>Role Name</label>
                            <input type="text" id="up-role-name" name="roleName" required>
                        </div>
                        <div class="form-group">
                            <label>Initial Status</label>
                            <select id="up-role-status" name="status">
                                <option value="">Select a Status</option>
                                <option value="Active">Active</option>
                                <option value="Suspended">Suspended</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-black">Create</button>
                </form>
            </div>
        </div>

        <div class="admin-section">
            <div class="section-header">
                <h2> Manage Profiles</h2>
            </div>

            <div class="action-bar">
                <div class="subsection">
                    <h3>Search User Profiles</h3>
                    <div class="grid-2" style="margin-bottom: 12px;">
                        <div class="form-group">
                            <label>Search Role Name</label>
                            <input id="up-search" type="text" placeholder="e.g. Admin, Fund Raiser">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="up-status">
                                <option value="all">All</option>
                                <option value="active">Active</option>
                                <option value="suspended">Suspended</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <div class="table-scroll">
                            <table id="up-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Role Name</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="up-tbody">
                                    <tr>
                                        <td colspan="4" class="muted" style="text-align: center;">Loading…</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination">
                            <div class="muted" id="up-count">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<div id="up-backdrop" class="drawer-backdrop"></div>
<aside id="up-drawer" class="drawer">
    <div class="drawer-header">
        <div class="drawer-title">
            <strong id="up-drawer-title">Profile Details</strong>
        </div>
        <button id="up-close" type="button" class="btn btn-muted btn-sm">Close</button>
    </div>
    <div class="drawer-body">
        <div class="kv">
            <div class="k">Profile ID</div>
            <div class="v" id="up-v-id">-</div>
        </div>
        <div class="kv">
            <div class="k">Role Name</div>
            <div class="v" id="up-v-role">-</div>
        </div>
        <div class="kv">
            <div class="k">Status</div>
            <div class="v" id="up-v-status">-</div>
        </div>

        <div id="up-edit-form" class="card" style="display: none;">
            <div class="muted" style="margin-bottom: 10px;">Update Role Name</div>
            <div class="form-group">
                <label>Role Name</label>
                <input id="up-e-role" type="text" placeholder="Role Name">
            </div>
        </div>
    </div>
    <div class="drawer-footer">
        <button id="up-save" type="button" class="btn btn-black" style="display: none;">Save Changes</button>
        <button id="up-toggle" type="button" class="btn btn-danger">Suspend</button>
    </div>
</aside>

<div id="up-toast" class="toast">Action Successful</div>

<div id="up-note-backdrop" class="modal-backdrop"></div>
<div id="up-note-modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
        <strong id="up-note-title">Notice</strong>
    </div>
    <div id="up-note-message" class="modal-body"></div>
    <div class="modal-footer">
        <button id="up-note-ok" type="button" class="btn btn-black">OK</button>
    </div>
</div>

<script>
    function showToast(msg) {
        const t = document.getElementById('up-toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 1500);
    }

    function upOpenModal(backdropId, modalId, titleId, messageId, title, message) {
        const backdrop = document.getElementById(backdropId);
        const modal = document.getElementById(modalId);
        const msgEl = document.getElementById(messageId);
        const titleEl = document.getElementById(titleId);
        if (titleEl) titleEl.textContent = title || 'Notice';
        if (msgEl) msgEl.textContent = message || '';
        backdrop?.classList.add('open');
        modal?.classList.add('open');
    }

    function upCloseModal(backdropId, modalId) {
        document.getElementById(backdropId)?.classList.remove('open');
        document.getElementById(modalId)?.classList.remove('open');
    }

    function upNoteOpen(message, title) {
        upOpenModal('up-note-backdrop', 'up-note-modal', 'up-note-title', 'up-note-message', title, message);
    }

    function upNoteClose() {
        upCloseModal('up-note-backdrop', 'up-note-modal');
    }

    function normalizeRoleKey(s) {
        if (s == null || s === undefined) return '';
        return String(s).replace(/\s+/g, '').toLowerCase();
    }

    function profileIsUserAdminRole(roleText) {
        return normalizeRoleKey(roleText) === 'useradmin';
    }

    function loadProfilesFromDatabase() {
        fetch('/api/profiles/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(profiles => {
                if (profiles && profiles.length > 0) {
                    displayProfiles(profiles);
                } else {
                    displayDefaultProfiles();
                }
            })
            .catch(error => {
                console.error("Error loading profiles:", error);
                displayDefaultProfiles();
            });
    }

    function displayDefaultProfiles() {
        const tbody = document.getElementById('up-tbody');
        const countDisplay = document.getElementById('up-count');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="4" class="muted" style="text-align: center;">Could not load profiles. Check server or database connection.</td></tr>';
        }
        if (countDisplay) countDisplay.textContent = 'Showing 0 roles';
    }

    function filterTable() {
        const keyword = document.getElementById('up-search').value.trim();
        const status = document.getElementById('up-status').value;
        
        if (keyword) {
            const params = new URLSearchParams();
            params.append('keyword', keyword);
            if (status && status !== 'all') {
                params.append('status', status);
            }
            
            const url = `/api/profiles/search?${params.toString()}`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Search failed");
                    return response.json();
                })
                .then(profiles => {
                    displayProfiles(profiles); 
                })
                .catch(error => {
                    console.error("Error searching profiles:", error);
                    showToast("Failed to load profiles!");
                });
        } else {
            loadProfilesFromDatabase();
        }
    }

    function displayProfiles(profiles) {
        const tbody = document.getElementById('up-tbody');
        const countDisplay = document.getElementById('up-count');
        const statusFilter = document.getElementById('up-status').value;
        
        tbody.innerHTML = '';
        
        if (!profiles || profiles.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No profiles found.</td></tr>`;
            countDisplay.textContent = `Showing 0 roles`;
            return;
        }

        let filteredProfiles = profiles;
        if (statusFilter && statusFilter !== 'all') {
            filteredProfiles = profiles.filter(profile => 
                profile.status && profile.status.toLowerCase() === statusFilter.toLowerCase()
            );
        }
        
        if (filteredProfiles.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No profiles found.</td></tr>`;
            countDisplay.textContent = `Showing 0 roles`;
            return;
        }

        filteredProfiles.forEach(profile => {
            const isSuspended = profile.status && profile.status.toLowerCase() === 'suspended';
            const pillClass = isSuspended ? 'pill bad' : 'pill ok';
            const pillText = isSuspended ? 'Suspended' : 'Active';
            const btnClass = isSuspended ? 'btn-muted' : 'btn-danger';
            const btnText = isSuspended ? 'Re-activate' : 'Suspend';

            const tr = document.createElement('tr');
            tr.setAttribute('data-status', profile.status ? profile.status.toLowerCase() : 'active');
            
            tr.innerHTML = `
                <td>${profile.profileId}</td>
                <td>${profile.roleName}</td>
                <td><span class="${pillClass}">${pillText}</span></td>
                <td>
                    <div class="td-actions">
                        <button type="button" class="btn btn-view btn-sm" data-action="edit">Update</button>
                        <button type="button" class="btn ${btnClass} btn-sm" data-action="toggle">${btnText}</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        countDisplay.textContent = `Showing ${filteredProfiles.length} roles`;
    }

    function openDrawer(mode, row) {
        const cells = row.querySelectorAll('td');
        const data = {
            id: cells[0].textContent,
            role: cells[1].textContent,
            status: row.getAttribute('data-status')
        };

        document.getElementById('up-drawer-title').textContent = mode === 'edit' ? 'Update Profile' : 'View Profile';
        document.getElementById('up-v-id').textContent = data.id;
        document.getElementById('up-v-role').textContent = data.role;
        document.getElementById('up-v-status').textContent = data.status === 'active' ? 'Active' : 'Suspended';
        
        document.getElementById('up-e-role').value = data.role;
        document.getElementById('up-edit-form').style.display = mode === 'edit' ? 'block' : 'none';
        document.getElementById('up-save').style.display = mode === 'edit' ? 'inline-flex' : 'none';

        const toggleBtn = document.getElementById('up-toggle');
        const isSusp = data.status === 'suspended';
        toggleBtn.textContent = isSusp ? 'Re-activate' : 'Suspend';
        toggleBtn.className = isSusp ? 'btn btn-muted' : 'btn btn-danger';

        document.getElementById('up-backdrop').classList.add('open');
        document.getElementById('up-drawer').classList.add('open');
    }

    function closeDrawer() {
        document.getElementById('up-backdrop').classList.remove('open');
        document.getElementById('up-drawer').classList.remove('open');
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadProfilesFromDatabase();
        
        const createForm = document.getElementById('up-create-form');
        if (createForm) {
            createForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const roleName = document.getElementById('up-role-name').value.trim();
                const status = document.getElementById('up-role-status').value;
                
                if (!roleName) {
                    showToast("Role name cannot be empty");
                    return;
                }
                
                const params = new URLSearchParams();
                params.append('roleName', roleName);
                params.append('status', status);
                
                fetch('/api/profiles/create', {
                    method: 'POST',
                    body: params,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                .then(async (response) => {
                    const text = await response.text();
                    return { ok: response.ok, text: (text || '').trim() };
                })
                .then(({ ok, text }) => {
                    if (text === 'Role already exists') {
                        upNoteOpen('Role already exists', 'Notice');
                        return;
                    }
                    if (text.startsWith('Success')) {
                        showToast('Profile created successfully!');
                        createForm.reset();
                        setTimeout(() => loadProfilesFromDatabase(), 500);
                        return;
                    }
                    upNoteOpen(ok ? text : ('Error: ' + (text || 'Failed to create profile')), 'Notice');
                })
                .catch(error => {
                    upNoteOpen('Error: ' + (error?.message || 'Failed to create profile'), 'Notice');
                });
            });
        }
        
        document.getElementById('up-search').addEventListener('input', () => {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(filterTable, 300); 
        });
        document.getElementById('up-status').addEventListener('change', filterTable);

        document.getElementById('up-close').addEventListener('click', closeDrawer);
        document.getElementById('up-backdrop').addEventListener('click', closeDrawer);

        document.getElementById('up-tbody').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const row = btn.closest('tr');
            const action = btn.getAttribute('data-action');

            if (action === 'edit') openDrawer('edit', row);
            if (action === 'toggle') {
                const roleName = row.querySelector('td:nth-child(2)')?.textContent?.trim() ?? '';
                const isSusp = row.getAttribute('data-status') === 'suspended';
                if (!isSusp && profileIsUserAdminRole(roleName)) {
                    upNoteOpen('Error: User Admin profiles cannot be suspended.', 'Notice');
                    return;
                }
                const profileId = row.querySelector('td:first-child').textContent;
                const newStatus = isSusp ? 'active' : 'suspended';
                const apiEndpoint = isSusp ? `/api/profiles/reactivate/${profileId}` : `/api/profiles/suspend/${profileId}`;

                (async () => {
                    try {
                        const response = await fetch(apiEndpoint, { method: 'POST' });
                        const msg = await response.text();
                        if (!response.ok) {
                            const detail = response.status === 403
                                ? (msg.trim() || 'User Admin profiles cannot be suspended.')
                                : (msg.trim() || 'Failed to update profile status');
                            upNoteOpen('Error: ' + detail, 'Notice');
                            return;
                        }
                        row.setAttribute('data-status', newStatus);
                        const pill = row.querySelector('.pill');
                        pill.className = isSusp ? 'pill ok' : 'pill bad';
                        pill.textContent = isSusp ? 'Active' : 'Suspended';
                        const toggleBtn = e.target;
                        toggleBtn.className = isSusp ? 'btn btn-danger btn-sm' : 'btn btn-muted btn-sm';
                        toggleBtn.textContent = isSusp ? 'Suspend' : 'Re-activate';
                        showToast(isSusp ? 'Profile reactivated' : 'Profile suspended');
                    } catch (error) {
                        upNoteOpen('Error: ' + (error?.message || 'Update failed'), 'Notice');
                    }
                })();
            }
        });

        document.getElementById('up-save').addEventListener('click', () => {
            const profileId = document.getElementById('up-v-id').textContent.trim();
            const newRoleName = document.getElementById('up-e-role').value.trim();

            if (!profileId) {
                showToast('Invalid profile id');
                return;
            }

            if (!newRoleName) {
                showToast('Role name cannot be empty');
                return;
            }

            const params = new URLSearchParams();
            params.append('newRoleName', newRoleName);

            fetch(`/api/profiles/update-role/${encodeURIComponent(profileId)}`, {
                method: 'POST',
                body: params,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            })
            .then(async response => {
                const message = (await response.text() || '').trim();
                if (!response.ok) {
                    if (message === 'Role already exists') {
                        upNoteOpen('Role already exists', 'Notice');
                    } else {
                        upNoteOpen('Error: ' + (message || 'Failed to update role name'), 'Notice');
                    }
                    return;
                }
                showToast('Role name updated!');
                closeDrawer();
                loadProfilesFromDatabase();
            })
            .catch(error => {
                upNoteOpen('Error: ' + (error?.message || 'Failed to update role name'), 'Notice');
            });
        });

        document.getElementById('up-toggle').addEventListener('click', () => {
            const profileId = document.getElementById('up-v-id').textContent.trim();
            const roleName = document.getElementById('up-v-role').textContent.trim();
            const currentStatusText = document.getElementById('up-v-status').textContent.trim().toLowerCase();
            const isSuspended = currentStatusText === 'suspended';
            const apiEndpoint = isSuspended
                ? `/api/profiles/reactivate/${encodeURIComponent(profileId)}`
                : `/api/profiles/suspend/${encodeURIComponent(profileId)}`;

            if (!profileId) {
                showToast('Invalid profile id');
                return;
            }

            if (!isSuspended && profileIsUserAdminRole(roleName)) {
                upNoteOpen('Error: User Admin profiles cannot be suspended.', 'Notice');
                return;
            }

            fetch(apiEndpoint, { method: 'POST' })
                .then(async response => {
                    const message = await response.text();
                    if (!response.ok) {
                        const detail = response.status === 403
                            ? (message.trim() || 'User Admin profiles cannot be suspended.')
                            : (message.trim() || 'Failed to update profile status');
                        upNoteOpen('Error: ' + detail, 'Notice');
                        throw new Error(detail);
                    }
                    return message;
                })
                .then(() => {
                    showToast(isSuspended ? 'Profile reactivated' : 'Profile suspended');
                    closeDrawer();
                    loadProfilesFromDatabase();
                })
                .catch(err => console.error(err));
        });

        document.getElementById('up-note-backdrop')?.addEventListener('click', upNoteClose);
        document.getElementById('up-note-ok')?.addEventListener('click', upNoteClose);
    });
</script>

</body>
</html>
