<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logout-card {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 30px;
            color: #000;
            margin-bottom: 15px;
        }

        p {
            font-size: 15px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .login-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #000;
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #222;
        }
    </style>
</head>
<body>

<div class="logout-card">
    <h1>You Have Logged Out</h1>
    <p>Your account has been logged out successfully.</p>
    <a class="login-btn" href="/LoginPage.html">Log In Again</a>
</div>

</body>
</html>
